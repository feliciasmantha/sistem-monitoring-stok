{% extends 'layout.html' %}

{% block title %}Stok Keluar{% endblock %}
{% block judul %}Data Stok Keluar{% endblock %}

{% block content %}

<div class="card mb-4">
<div class="card-body">

<form method="POST">

<div class="row">

<div class="col-md-3">

<select
name="bahan_id"
class="form-control"
required>

<option value="">Pilih Bahan</option>

{% for b in bahan %}

<option value="{{ b[0] }}">
{{ b[1] }}
</option>

{% endfor %}

</select>

</div>

<div class="col-md-2">

<input
type="number"
name="jumlah"
class="form-control"
placeholder="Jumlah"
required>

</div>

<div class="col-md-3">

<input
type="date"
name="tanggal"
class="form-control"
required>

</div>

<div class="col-md-2">

<input
type="text"
name="keterangan"
class="form-control"
placeholder="Keterangan">

</div>

<div class="col-md-2">

<button class="btn btn-danger w-100">

Simpan

</button>

</div>

</div>

</form>

</div>
</div>

<div class="card">

<div class="card-body">

<table class="table table-hover">

<thead class="table-danger">

<tr>

<th>ID</th>

<th>Bahan</th>

<th>Jumlah</th>

<th>Tanggal</th>

<th>Keterangan</th>

</tr>

</thead>

<tbody>

{% for row in data %}

<tr>

<td>{{ row[0] }}</td>

<td>{{ row[1] }}</td>

<td>{{ row[2] }}</td>

<td>{{ row[3] }}</td>

<td>{{ row[4] }}</td>

</tr>

{% endfor %}

</tbody>

</table>

</div>

</div>

{% endblock %}
