<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Login - Sistem Monitoring Stok D'Kriuk</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{

    min-height:100vh;

    background:
    linear-gradient(rgba(0,0,0,.55),rgba(0,0,0,.55)),
    url("{{ url_for('static', filename='img/outlet.png') }}");

    background-size:cover;
    background-position:center;
    background-repeat:no-repeat;

    display:flex;
    justify-content:center;
    align-items:center;

}

.login-box{

    width:430px;

}

.card{

    border:none;
    border-radius:20px;

    overflow:hidden;

    backdrop-filter:blur(12px);

    background:rgba(255,255,255,.95);

    box-shadow:0 20px 50px rgba(0,0,0,.35);

}

.header{

    background:#dc3545;
    color:white;

    text-align:center;

    padding:35px;

}

.header img{

    width:120px;

    margin-bottom:15px;

}

.header h1{

    font-weight:bold;
    margin-bottom:8px;

}

.header p{

    margin:0;
    font-size:20px;

}

.card-body{

    padding:35px;

}

.form-control{

    height:50px;

    border-radius:10px;

}

.btn-login{

    width:100%;

    height:50px;

    background:#dc3545;

    color:white;

    border:none;

    border-radius:10px;

    font-size:20px;

    transition:.3s;

}

.btn-login:hover{

    background:#bb2d3b;

}

.footer{

    margin-top:20px;

    color:white;

    text-align:center;

    text-shadow:0 2px 10px rgba(0,0,0,.5);

}
    </style>

</head>

<div class="login-box">

    <div class="card">

        <div class="header">

            <img src="{{ url_for('static', filename='img/logo.png') }}">

            <h1>D'KRIUK</h1>

            <p>Sistem Monitoring Stok</p>

        </div>

        <div class="card-body">

            <form method="POST">

                <div class="mb-3">

                    <label>Username</label>

                    <input
                    type="text"
                    name="username"
                    class="form-control"
                    required>

                </div>

                <div class="mb-4">

                    <label>Password</label>

                    <input
                    type="password"
                    name="password"
                    class="form-control"
                    required>

                </div>

                <button class="btn-login">

                    Login

                </button>

            </form>

        </div>

    </div>

    <div class="footer">

        © 2026 Sistem Monitoring Stok Franchise D'Kriuk

    </div>

</div>

</html>
